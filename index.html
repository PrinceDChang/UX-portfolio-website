<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%BASE_URL%favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%BASE_URL%apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090f" />
    <title>Oey Chang — UX Designer</title>
    <script>
      (function () {
        var t = localStorage.getItem('oey-portfolio-theme')
        if (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches)) {
          document.documentElement.dataset.theme = 'light'
          document.documentElement.style.colorScheme = 'light'
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', '#f8f7fc')
        } else {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
